name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1️⃣ Get code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install PyInstaller only
      - name: Install PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # 4️⃣ Safety check (catches syntax errors early)
      - name: Validate script
        shell: pwsh
        run: python -m py_compile main.py

      # 5️⃣ Build EXE
      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --clean `
            --noconsole `
            --name "MyApp" `
            main.py

      # 6️⃣ Upload result
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EXE
          path: dist/MyApp.exe
